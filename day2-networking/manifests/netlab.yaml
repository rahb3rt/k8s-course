# A busybox pod with network tools (ping, wget, nslookup) for dataplane testing.
# Lands on the worker (cp is tainted), so traffic to CoreDNS on cp is a cross-node hop.
#   kubectl apply -f netlab.yaml
#   kubectl exec netlab -- ping -c3 <ip>
apiVersion: v1
kind: Pod
metadata:
  name: netlab
spec:
  restartPolicy: Never
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep", "3600"]
