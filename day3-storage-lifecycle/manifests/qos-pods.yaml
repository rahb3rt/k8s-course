# Three pods, one per QoS class. Kubernetes DERIVES the class from requests/limits.
#   kubectl apply -f qos-pods.yaml
#   kubectl get pods -o custom-columns='NAME:.metadata.name,QOS:.status.qosClass'
#   kubectl exec qos-guaranteed -- cat /proc/1/oom_score_adj   # -997 (killed last)
#   kubectl exec qos-besteffort -- cat /proc/1/oom_score_adj   # 1000 (killed first)
---
apiVersion: v1
kind: Pod
metadata:
  name: qos-guaranteed          # requests == limits (cpu+mem) => Guaranteed
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests: {memory: 64Mi, cpu: "50m"}
        limits:   {memory: 64Mi, cpu: "50m"}
---
apiVersion: v1
kind: Pod
metadata:
  name: qos-burstable           # some requests/limits, not matching => Burstable
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests: {memory: 32Mi}
        limits:   {memory: 128Mi}
---
apiVersion: v1
kind: Pod
metadata:
  name: qos-besteffort          # nothing set => BestEffort (first to die)
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep", "3600"]
