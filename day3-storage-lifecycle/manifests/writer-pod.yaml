# Mounts the `data` PVC, writes a note, stays alive. Scheduling this pod is what triggers
# the WaitForFirstConsumer PVC to actually bind and provision a PV.
#   kubectl apply -f writer-pod.yaml && kubectl wait --for=condition=Ready pod/writer
#   kubectl get pvc data   # now Bound   ;   kubectl get pv   # dynamically created
apiVersion: v1
kind: Pod
metadata:
  name: writer
spec:
  restartPolicy: Never
  containers:
    - name: c
      image: busybox:1.36
      command: ["sh", "-c", "echo \"written at $(date) by $(hostname)\" > /data/note.txt; cat /data/note.txt; sleep 3600"]
      volumeMounts:
        - {name: vol, mountPath: /data}
  volumes:
    - name: vol
      persistentVolumeClaim:
        claimName: data
